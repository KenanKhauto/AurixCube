<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AurixCube</title>
    <link rel="icon" type="image/x-icon" href="static/images/main_logo.png">
    <link rel="stylesheet" href="/static/css/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

<header class="navbar">
    <div class="nav-container">

        <!-- LEFT -->
        <div class="nav-right">
            <a href="/login" class="nav-link {% if request.url.path == '/login' %}active-nav{% endif %}">
                <img src="/static/images/login-logo.png" class="nav-img">
            </a>
        </div>

        <!-- CENTER -->
        <div class="nav-center">
            <a href="/" class="nav-link {% if request.url.path == '/' %}active-nav{% endif %}">
                <img src="/static/images/home-logo.png" class="nav-img">
            </a>

            <a href="/games" class="nav-link {% if request.url.path.startswith('/games') %}active-nav{% endif %}">
                <img src="/static/images/games-logo.png" class="nav-img">
            </a>

            <a href="/about" class="nav-link {% if request.url.path == '/about' %}active-nav{% endif %}">
                <img src="/static/images/about-logo.png" class="nav-img">
            </a>
        </div>

        <!-- RIGHT -->
        <div class="nav-left">
            <div class="logo">
                <img src="/static/images/main_logo.png" class="nav-logo">
            </div>
        </div>

    </div>

    <div id="mobileMenu" class="mobile-menu hidden">
        <a href="/" class="{% if request.url.path == '/' %}active-nav{% endif %}">Home</a>
        <a href="/games" class="{% if request.url.path.startswith('/games') %}active-nav{% endif %}">Games</a>
        <a href="/about" class="{% if request.url.path == '/about' %}active-nav{% endif %}">About</a>

        {% if request.session.get("user_id") %}
            <a href="/profile" class="{% if request.url.path == '/profile' %}active-nav{% endif %}">
                Hi, {{ current_user.display_name or current_user.username }}
            </a>
        {% else %}
            <a href="/login" class="{% if request.url.path == '/login' %}active-nav{% endif %}">Login</a>
        {% endif %}
    </div>
</header>

<main class="main-content">
    {% block content %}{% endblock %}
</main>

<footer class="site-footer">
    <div class="footer-container">
        <div class="footer-right">
            <div class="footer-brand">
                <img src="/static/images/main_logo.png" class="footer-logo">
                <div>
                    AurixCube <br>
                    All rights reserved © {{ current_year or 2026 }}
                </div>
            </div>
        </div>

        <div class="footer-right">
            Built by <span class="footer-name">Kenan Khauto</span> &
            <span class="footer-name">Amro Khazah</span>
        </div>
    </div>
</footer>

<script>
function toggleMenu() {
    document.getElementById("mobileMenu").classList.toggle("hidden");
}

function goHome() {
    window.location.href = "/";
}

function setupNavIndicator() {
    const nav = document.getElementById("desktopNav");
    const indicator = document.getElementById("navIndicator");
    if (!nav || !indicator) return;

    const links = nav.querySelectorAll(".nav-link");
    const activeLink = nav.querySelector(".nav-link.active-nav");

    function moveIndicator(target) {
        if (!target) {
            indicator.style.opacity = "0";
            indicator.style.width = "0px";
            return;
        }

        const navRect = nav.getBoundingClientRect();
        const targetRect = target.getBoundingClientRect();
        const rightOffset = navRect.right - targetRect.right;

        indicator.style.width = `${targetRect.width}px`;
        indicator.style.right = `${rightOffset}px`;
        indicator.style.opacity = "1";
    }

    if (activeLink) {
        moveIndicator(activeLink);
    }

    links.forEach((link) => {
        link.addEventListener("mouseenter", () => moveIndicator(link));
    });

    nav.addEventListener("mouseleave", () => {
        moveIndicator(activeLink);
    });

    window.addEventListener("resize", () => {
        const currentActive = nav.querySelector(".nav-link.active-nav");
        moveIndicator(currentActive);
    });
}

document.addEventListener("DOMContentLoaded", setupNavIndicator);
</script>

</body>
</html>
